<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#667eea">
  <meta name="description" content="Tu lista de la compra">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./img/icon-192x192.png">
  <title>Lista de la Compra</title>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>LISTA DE LA COMPRA</h1>
        <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">
          🌙
        </button>
      </div>

      <form class="form" id="formulario">
        <input type="text" id="producto" placeholder="Añadir producto..." autocomplete="off" />
        <button type="submit" aria-label="Añadir">
          +
        </button>
      </form>

      <div class="lista" id="listaProductos"></div>

      <div class="contador" id="contador"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./js/app.js"></script>
</body>

</html>
